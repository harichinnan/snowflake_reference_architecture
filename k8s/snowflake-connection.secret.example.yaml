# =============================================================================
# Snowflake Airflow connection for the k8s deployment.
# Copy to k8s/snowflake-connection.secret.yaml (git-ignored), fill credentials,
# then:  kubectl apply -n airflow -f k8s/snowflake-connection.secret.yaml
#
# Cosmos reads conn_id `snowflake_claims` from AIRFLOW_CONN_SNOWFLAKE_CLAIMS.
# account = your locator (e.g. VHYCQZG-PO12637), NOT the full URL.
# Data is SYNTHETIC -- not real CMS/Medicare/Medicaid/PHI.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: claims-snowflake-conn
  namespace: airflow
type: Opaque
stringData:
  AIRFLOW_CONN_SNOWFLAKE_CLAIMS: '{"conn_type":"snowflake","login":"YOUR_USER","password":"YOUR_PASSWORD","schema":"CONTROL","extra":{"account":"YOUR_ORG-YOUR_ACCOUNT","warehouse":"WH_CLAIMS_TRANSFORM","database":"CLAIMS_DEV","role":"CLAIMS_TRANSFORMER"}}'
